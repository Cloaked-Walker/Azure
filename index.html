<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azure</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- head -->

    <div class="head">
        <header>
            <div class="nav-main">
                <div class="nav">
                    <span class="microsoft-logo"><img src="https://uhf.microsoft.com/images/microsoft/RE1Mu3b.png"
                            alt="microsoft logo"></span>
                    <button class="search-button"></button>
                </div>
                <div class="azure-b">
                    <button class="azure-button">Azure</button>
                </div>
            </div>
        </header>
    </div>

    <!-- body -->

    <div class="main-body">

        <!-- top-section -->

        <div class="top-section">

            <!-- banner -->

            <div class="banner">
                <img class="banner-img"
                    src="https://cdn-dynmedia-1.microsoft.com/is/image/microsoftcorp/54300-Azure-LimitlessInnovation-Background-1600x580?resMode=sharp2&op_usm=1.5,0.65,15,0&wid=1600&hei=666&qlt=100&fit=constrain"
                    alt="banner img">
            </div>

            <!-- container-first -->

            <div class="container-first">
                <div class="contain-row">
                    <div class="contain-col">
                        <div class="contain-sec">
                            <div class="cfir-text">
                                <div class="innovation-head">
                                    AZURE. LIMITLESS INNOVATION.
                                </div>
                                <h1>Your data, your rules</h1>
                                <div>
                                    <p>Build, deploy, and scale AI-powered apps and agents faster with your data flowing
                                        across
                                        a connected software lifecycle.
                                        Try Azure free for up to 30 days. There's no upfront commitment—cancel anytime.
                                    </p>
                                </div>
                                <div class="cfir-text-bottom">
                                    <div class="cfir-button">
                                        <button class="cfir-start">
                                            <span>Get started with Azure</span>
                                        </button>
                                        <button class="cfir-explore">
                                            <span>Explore Azure AI Foundry</span>
                                        </button>
                                    </div>
                                </div>
                            </div>
                            <div class="cfir-img">
                                <img src="https://cdn-dynmedia-1.microsoft.com/is/image/microsoftcorp/54300-Azure-Limitless-Innovation-Hero-568x320?resMode=sharp2&op_usm=1.5,0.65,15,0&wid=2000&hei=1125&qlt=100&fit=constrain"
                                    alt="cfir img">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- body-section -->

        <div class="body-section">
            <div class="featured-main">
                <div class="news-main">
                    <div class="news">
                        <span class="news-text">Featured news</span>
                        <div class="blue-arrow"></div>
                    </div>
                </div>
                <div class="blue-line"></div>
            </div>

            <div class="ai-main">
                <div class="ai-assistant"></div>
            </div>


        </div>
    </div>
</body>

</html>
